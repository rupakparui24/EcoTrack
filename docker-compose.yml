services:
  postgres:
    image: postgres:16
    container_name: ecotrack-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ecotrack
    ports:
      - "5432:5432"
    volumes:
      - ecotrack_pg_data:/var/lib/postgresql/data

volumes:
  ecotrack_pg_data:

